<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Manual Resume Compare</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; font-family: sans-serif; background: #1a1a1a; }
        .header {
            height: 60px; background: #24292e; display: flex;
            align-items: center; justify-content: space-between;
            padding: 0 20px; color: white; border-bottom: 1px solid #444;
        }
        .file-input-group { display: flex; align-items: center; gap: 10px; font-size: 13px; }
        input[type="file"] { color: #ccc; width: 180px; }

        .refresh-btn {
            cursor: pointer; padding: 8px 20px; background: #2da44e;
            color: white; border: none; border-radius: 6px; font-weight: bold;
        }
        .refresh-btn:hover { background: #2c974b; }
        .refresh-btn:disabled { background: #444; opacity: 0.5; cursor: not-allowed; }

        .container { display: flex; height: calc(100vh - 60px); gap: 4px; padding: 4px; box-sizing: border-box; }
        .frame-wrapper { flex: 1; background: white; height: 100%; border-radius: 4px; overflow: hidden; }
        iframe { width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>

<div class="header">
    <div class="file-input-group">
        <strong>V1:</strong> <input type="file" id="file1" accept=".html">
    </div>

    <button id="refresh-btn" class="refresh-btn" disabled>ОБНОВИТЬ</button>

    <div class="file-input-group">
        <strong>V2:</strong> <input type="file" id="file2" accept=".html">
    </div>
</div>

<div class="container">
    <div class="frame-wrapper"><iframe id="ifr1"></iframe></div>
    <div class="frame-wrapper"><iframe id="ifr2"></iframe></div>
</div>

<script>
    const f1 = document.getElementById('file1');
    const f2 = document.getElementById('file2');
    const ifr1 = document.getElementById('ifr1');
    const ifr2 = document.getElementById('ifr2');
    const btn = document.getElementById('refresh-btn');

    // Храним ссылки на файлы в памяти
    let file1 = null;
    let file2 = null;

    function updateIframe(ifr, file) {
        if (!file) return;
        // Генерируем URL для файла.
        // Если использовать один и тот же URL, браузер может закешировать,
        // поэтому мы всегда создаем новый через URL.createObjectURL
        const url = URL.createObjectURL(file);
        ifr.src = url;
    }

    f1.onchange = (e) => {
        file1 = e.target.files[0];
        updateIframe(ifr1, file1);
        checkButton();
    };

    f2.onchange = (e) => {
        file2 = e.target.files[0];
        updateIframe(ifr2, file2);
        checkButton();
    };

    function checkButton() {
        btn.disabled = !(file1 || file2);
    }

    // Тот самый безопасный рефреш
    btn.onclick = () => {
        if (file1) updateIframe(ifr1, file1);
        if (file2) updateIframe(ifr2, file2);

        // Визуальный фидбек
        btn.textContent = "ГОТОВО!";
        setTimeout(() => { btn.textContent = "ОБНОВИТЬ"; }, 1000);
    };

    // ПРИМЕЧАНИЕ ПО СКРОЛЛУ:
    // Синхронизация скролла между ифреймами при открытии через file://
    // почти всегда будет блокироваться браузером из-за безопасности.
    // Чтобы скролл работал, нужно запускать этот файл через любой сервер (Live Server).
</script>

</body>
</html>
